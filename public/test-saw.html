<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Xerrac! — Feather Hi-Stainless</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f5f5f5;
  color: #111;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  padding: 60px 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 30px;
  justify-content: center;
  align-items: flex-start;
}
.card {
  background: #fff;
  border-radius: 16px;
  padding: 48px 36px 36px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.06);
  width: 360px;
  text-align: center;
}
.card svg {
  display: block;
  margin: 0 auto;
  width: 100%;
  height: auto;
  max-width: 200px;
}
.label {
  margin-top: 24px;
  font-size: 26px;
  font-weight: 900;
  letter-spacing: -1px;
}
.label span { color: #FF0000; }
.desc {
  color: #888;
  font-size: 11px;
  margin-top: 12px;
  font-family: 'SF Mono', monospace;
  letter-spacing: 0.5px;
}
</style>
</head>
<body>

<div class="card">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 200">
    <path d="
      M 6,16
      L 6,22
      L 34,22
      L 34,10
      L 66,10
      L 66,22
      L 94,22
      L 94,16
      L 94,184
      L 94,178
      L 66,178
      L 66,184
      L 66,190
      L 34,190
      L 34,184
      L 34,178
      L 6,178
      L 6,184
      L 6,16
      Z
    " fill="#FF0000"/>

    <rect x="36" y="65" width="28" height="70" rx="8" fill="#fff"/>
    <circle cx="20" cy="100" r="2.8" fill="#fff"/>
    <circle cx="80" cy="100" r="2.8" fill="#fff"/>

    <rect x="47" y="38" width="6" height="25" rx="1.2" fill="#0a0a0a"/>
    <circle cx="50" cy="70" r="4.5" fill="#0a0a0a"/>
  </svg>

  <div class="label">Xerrac<span>!</span></div>
  <div class="desc">Feather Hi-Stainless — slits to edge, smaller features, clean</div>
</div>

</body>
</html>
